name: CD Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: .zip
          - os: ubuntu-latest
            rid: linux-x64
            ext: .tar.gz
          - os: macos-latest
            rid: osx-x64
            ext: .zip

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: SemanticRasterEditor

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Build & Publish Avalonia App
      run: dotnet publish Editor.App/Editor.App.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o ./publish

    - name: Archive Release
      uses: thedoctor0/zip-release@main
      with:
        type: ${{ matrix.os == 'ubuntu-latest' && 'tar' || 'zip' }}
        filename: SemanticEditor-${{ matrix.rid }}${{ matrix.ext }}
        directory: ./publish

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ./publish/SemanticEditor-${{ matrix.rid }}${{ matrix.ext }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
